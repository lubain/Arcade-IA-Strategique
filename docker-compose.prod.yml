services:
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    expose:
      - "8000"
    restart: unless-stopped
    networks:
      - ttt-network

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    depends_on:
      - backend
    ports:
      - "80:80"
    restart: unless-stopped
    networks:
      - ttt-network

networks:
  ttt-network:
    driver: bridge
